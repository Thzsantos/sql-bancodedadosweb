<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tela de cadastro</title>
  <link rel="stylesheet" href="/static/style.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      display: flex;
      width: 780px;
      height: 420px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* Painel verde */
    .overlay {
      width: 42%;
      background: #e8adf7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2.5rem;
      gap: 1rem;
    }

    .overlay h2 { font-size: 22px; font-weight: 500; color: #fff; }
    .overlay p  { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.6; }

    .overlay button {
      padding: 10px 28px;
      background: transparent;
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.8);
      border-radius: 25px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    .overlay button:hover { background: rgba(255,255,255,0.15); }

    /* Painel do formulário */
    .form-area {
      flex: 1;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      transition: opacity 0.3s, transform 0.4s;
      position: absolute;
    }

    .panel.hidden {
      opacity: 0;
      transform: translateX(40px);
      pointer-events: none;
    }

    .panel h2 { font-size: 22px; font-weight: 500; color: #e8adf7 }
    .panel p  { font-size: 13px; color: #696769; }

    input {
      width: 100%;
      max-width: 300px;
      padding: 11px 14px;
      background: #f1f1f1;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: background 0.2s;
    }

    input:focus { background: #e7e7e7; }

    .btn-submit {
      width: 100%;
      max-width: 300px;
      padding: 11px;
      background: #e8adf7;
      color: #fff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.06em;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }


    .btn-submit:hover { background: #d39de0; }



</style>


</head>
<body>
<div class="container">
  <div class="overlay">
    <h2 id="ov-title">Seja bem-vindo!</h2>
    <p id="ov-sub">Faça login em nosso site e aproveite!</p>
    <button type="button">Entrar</button>
  </div>

  <div class="form-area">
    <div class="panel" id="panel-login">
      <h2>CADASTRAR</h2>
      <p>ou use seus dados para se cadastrar!:</p>
      <form action="/cadastro" method="POST">
        <input type="text" name="nome" placeholder="Nome" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="tel" name="telefone" placeholder="Telefone" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit" class="btn-submit">ENTRAR</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>

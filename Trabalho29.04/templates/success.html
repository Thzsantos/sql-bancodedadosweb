<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Concluído</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .success-container {
            width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .success-container h1 {
            color: #28a745;
            margin-bottom: 20px;
        }

        .success-container p {
            color: #555;
            font-size: 16px;
        }

        .success-container a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .success-container a:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <h1>✅ Cadastro realizado com sucesso
